<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Neumorphic Button без React</title>
    <style>
        /* ------------------------------
           CSS-переменные для тем
        ------------------------------ */
        :root {
            --bg: #e0e0e0;
            --text: #555;
            --light-shadow: rgba(255,255,255,0.7);
            --dark-shadow: rgba(0,0,0,0.15);
            --hover-bg: #f0f0f0;
        }
        [data-theme="dark"] {
            --bg: #2e2e2e;
            --text: #ddd;
            --light-shadow: rgba(0,0,0,0.2);
            --dark-shadow: rgba(0,0,0,0.5);
            --hover-bg: #3a3a3a;
        }

        /* ------------------------------
           Базовая стилизация страницы
        ------------------------------ */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: sans-serif;
            transition: background 0.3s ease;
        }
        .toggle-btn {
            margin-top: 24px;
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
        }

        /* ------------------------------
           Анимация пульсации
        ------------------------------ */
        @keyframes pulse {
            0%   { transform: translateY(-2px) scale(1); }
            50%  { transform: translateY(-4px) scale(1.03); }
            100% { transform: translateY(-2px) scale(1); }
        }

        /* ------------------------------
           Neumorphic-кнопка
        ------------------------------ */
        .neumo-btn {
            position: relative;
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            outline: none;
            font-weight: 900;
            text-shadow: 1px 1px 0 var(--light-shadow);
            text-transform: uppercase;
            transition: box-shadow 0.3s ease, background 0.3s ease;

            box-shadow:
                    -2px -2px 9px var(--light-shadow),
                    2px  2px 9px var(--dark-shadow);
        }

        /* эффект radial-glow через ::before */
        .neumo-btn::before {
            content: "";
            position: absolute;

            border-radius: inherit;
            background: radial-gradient(
                    circle at 25% 25%,
                    rgba(255,255,255,0.5),
                    transparent 70%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* Hover-состояние */

        .neumo-btn:hover::before {
            opacity: 1;
        }

        /* Active (нажатие) */
        .neumo-btn:active {
            animation: none;
            transform: translateY(0) scale(0.98);
            box-shadow:
                    inset 2px  2px 8px rgba(0,0,0,0.1),
                    inset -2px -2px 8px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body data-theme="light">

<button class="neumo-btn">Click me</button>
<button class="toggle-btn" id="themeToggle">Тёмная тема</button>

<script>
    // Тoggler свет/тьма
    const btn = document.getElementById('themeToggle');
    btn.addEventListener('click', () => {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? 'Тёмная тема' : 'Светлая тема';
    });
</script>
</body>
</html>
