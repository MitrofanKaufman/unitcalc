<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-2xl p-6">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Тест Tailwind CSS</h1>
    
    <div class="space-y-4">
      <div class="p-4 bg-blue-100 text-blue-800 rounded border border-blue-200">
        Это уведомление с использованием Tailwind CSS
      </div>
      
      <button class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
        Тестовая кнопка
      </button>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
        <div class="p-4 bg-white border rounded-lg shadow-sm">
          <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
          <div class="h-3 bg-gray-100 rounded w-1/2"></div>
        </div>
        <div class="p-4 bg-white border rounded-lg shadow-sm">
          <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
          <div class="h-3 bg-gray-100 rounded w-1/2"></div>
        </div>
      </div>
    </div>
    
    <div class="mt-8 text-sm text-gray-500">
      <p>Если вы видите стилизованные элементы, значит Tailwind CSS работает через CDN.</p>
      <p class="mt-2">Если стили не применяются, проверьте консоль браузера на наличие ошибок.</p>
    </div>
  </div>
</body>
</html>
